name: Build
on:
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    permissions:
      contents: write

    steps:
      - name: Add safe.directory Update libnx
        run: |
          git config --global --add safe.directory "*"
          # git clone --recurse-submodules https://github.com/switchbrew/libnx.git
          # cd libnx
          # make -j$(nproc) install

      - name: Checkout latest code
        uses: actions/checkout@v6
        with:
          clean: true
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Extract version
        run: |
          APP_NAME="Hekate"
          VER_FILE="Versions.inc"
          BL_KEY="BLVERSION_"
          NYX_KEY="NYXVERSION_"
          BL_VER="$(grep -F "$BL_KEY" "$VER_FILE" | grep -oE '[0-9]+' | head -3 | paste -s -d '.')"
          NYX_VER="$(grep -F "$NYX_KEY" "$VER_FILE" | grep -oE '[0-9]+' | head -3 | paste -s -d '.')"
          SHORT_HASH="$(git rev-parse --short=7 HEAD)"
          echo "TAG_NAME=v${BL_VER}-${SHORT_HASH}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${APP_NAME} v${BL_VER} & Nyx v${NYX_VER} (${SHORT_HASH})" >> "$GITHUB_ENV"
          echo "FINAL_ZIP=hekate_ctcaer_${BL_VER}_Nyx_${NYX_VER}_sc.zip" >> "$GITHUB_ENV"

      - name: Build
        run: make -j$(nproc) all

      - name: Download latest hekate_ctcaer release
        run: |
          apt update && apt install -y jq
          API_URL="https://api.github.com/repos/CTCaer/hekate/releases/latest"
          ASSET_URL=$(curl -s $API_URL | jq -r '.assets[] | select(.name | test("^hekate_ctcaer_.+\\.zip$")) | .browser_download_url')
          ASSET_NAME=$(curl -s $API_URL | jq -r '.assets[] | select(.name | test("^hekate_ctcaer_.+\\.zip$")) | .name')
          curl -L "$ASSET_URL" -o "$ASSET_NAME"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Replace binaries and repackage
        run: |
          ZIP_FILE="${{ env.ASSET_NAME }}"
          UNZIP_DIR="hekate_tmp"
          unzip -q "$ZIP_FILE" -d "$UNZIP_DIR"
          cp -f output/hekate.bin "$UNZIP_DIR"/hekate_ctcaer_*.bin
          cp -f output/hekate.bin "$UNZIP_DIR"/bootloader/update.bin
          cp -f output/nyx.bin "$UNZIP_DIR"/bootloader/sys/nyx.bin
          cd "$UNZIP_DIR"
          zip -r "../${{ env.FINAL_ZIP }}" ./*
          cd ..

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
          files: |
            ${{ env.FINAL_ZIP }}
